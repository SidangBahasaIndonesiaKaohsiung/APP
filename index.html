<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SBIK</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'%3E%3C/path%3E%3Cpath d='M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'%3E%3C/path%3E%3C/svg%3E?v=3">
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect width='24' height='24' fill='%23020617'/%3E%3Cpath d='M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z'%3E%3C/path%3E%3Cpath d='M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z'%3E%3C/path%3E%3C/svg%3E?v=3">

    <style>
        html, body { 
            margin: 0; padding: 0; background-color: #020617 !important; 
            overflow: hidden; height: 100vh; width: 100vw;
            touch-action: none; /* スワイプ操作をJSで制御するために必要 */
        }
        #loading-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020617; display: flex; justify-content: center;
            align-items: center; z-index: 9999; transition: opacity 0.8s ease;
            pointer-events: none;
        }
        .loading-text {
            color: #00e676; font-family: sans-serif; font-size: 28px;
            font-weight: bold; letter-spacing: 4px; animation: pulse 1.5s infinite ease-in-out;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.2; } 50% { opacity: 0.8; } }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 1; }
        .fade-out { opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading-screen"><div class="loading-text">APP_SBIK</div></div>
    <iframe id="gas-app" src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" allow="geolocation; camera; microphone; autoplay"></iframe>

    <script>
        const loader = document.getElementById('loading-screen');
        const iframe = document.getElementById('gas-app');

        // 読み込み完了でロゴを消す
        iframe.onload = () => loader.classList.add('fade-out');
        setTimeout(() => loader.classList.add('fade-out'), 5000);

        // --- 下にスワイプして更新する機能 ---
        let startY = 0;
        window.addEventListener('touchstart', (e) => {
            startY = e.touches[0].pageY;
        }, {passive: true});

        window.addEventListener('touchmove', (e) => {
            const currentY = e.touches[0].pageY;
            const distance = currentY - startY;

            // 150ピクセル以上下に引っ張ったらリロード
            if (distance > 150) {
                loader.classList.remove('fade-out'); // ロゴを再表示
                // URLに時間を付けて強制リロード
                const url = new URL(window.location.href);
                url.searchParams.set('t', new Date().getTime());
                window.location.replace(url.toString());
                startY = 0; // 重複防止
            }
        }, {passive: true});
    </script>
</body>
</html>
