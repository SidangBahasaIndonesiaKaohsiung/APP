<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SBIK</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background-color: #020617 !important; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            display: flex;
            flex-direction: column; /* アイコンと文字を縦に並べる */
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        /* アイコンのスタイル */
        .loading-icon {
            color: #00e676;
            font-size: 60px; /* アイコンの大きさ */
            margin-bottom: 20px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .loading-text {
            color: #00e676;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            font-size: 24px; /* 少し調整 */
            font-weight: bold;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 1;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <span class="material-symbols-outlined loading-icon">menu_book</span>
        <div class="loading-text">APP_SBIK</div>
    </div>

    <iframe 
        id="gas-app"
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation; camera; microphone; autoplay">
    </iframe>

    <script>
        const loader = document.getElementById('loading-screen');
        document.getElementById('gas-app').onload = function() {
            loader.classList.add('fade-out');
        };
        setTimeout(() => {
            loader.classList.add('fade-out');
        }, 3000);
    </script>
</body>
</html>
