<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APP_SBIK</title>
    <style>
        :root { --ai-color: #00e676; }
        html, body { margin: 0; padding: 0; background: #020617 !important; overflow: hidden; height: 100vh; }

        /* ローダーのフェードアウトを 0.2s（爆速）に短縮 */
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #020617; display: flex; justify-content: center; align-items: center; z-index: 20000; transition: opacity 0.2s; }
        .loader-container { position: relative; width: 120px; height: 120px; display: flex; justify-content: center; align-items: center; }
        .scan-line { position: absolute; width: 100%; height: 20px; background: linear-gradient(to bottom, transparent, var(--ai-color), transparent); opacity: 0.3; animation: scan-move 2s linear infinite; }
        .ring-outer { position: absolute; width: 100%; height: 100%; border: 1.5px dashed var(--ai-color); border-radius: 50%; opacity: 0.2; animation: rotate-ccw 5s linear infinite; }
        .ring-mid { position: absolute; width: 80%; height: 80%; border: 3px solid transparent; border-top: 2px solid var(--ai-color); border-bottom: 2px solid var(--ai-color); border-radius: 50%; opacity: 0.6; animation: rotate-cw 1.5s linear infinite; }
        .core-sphere { width: 12px; height: 12px; background: var(--ai-color); border-radius: 50%; box-shadow: 0 0 15px var(--ai-color); animation: pulse-glow 1s infinite; }
        
        @keyframes rotate-cw { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-ccw { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        @keyframes pulse-glow { 0%, 100% { transform: scale(0.8); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes scan-move { 0% { transform: translateY(-60px); } 100% { transform: translateY(60px); } }

        /* 最初から「透明に近い表示状態」にしておき、出現時の transition も最短に */
        #app-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            border: none;
            background: #020617;
            opacity: 0.01;
            transition: opacity 0.2s ease-out;
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-container">
        <div class="scan-line"></div>
        <div class="ring-outer"></div>
        <div class="ring-mid"></div>
        <div class="core-sphere"></div>
    </div>
</div>

<iframe id="app-frame" 
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation *; camera *; microphone *; autoplay *"
        onload="showApp()">
</iframe>

<script>
    const neonColors = ['#00e676', '#00b0ff', '#d500f9', '#ffea00', '#ff3d00', '#00ffff', '#ff0055'];
    document.documentElement.style.setProperty('--ai-color', neonColors[Math.floor(Math.random() * neonColors.length)]);

    const loader = document.getElementById('loading');
    const frame = document.getElementById('app-frame');

    function showApp() {
        if (loader.style.display === 'none') return;
        frame.style.opacity = '1'; 
        loader.style.opacity = '0';
        setTimeout(() => { loader.style.display = 'none'; }, 200);
    }

    // iPhoneのフリーズを避けるための強制表示も 0.5秒（体感一瞬）に短縮
    setTimeout(showApp, 500);
</script>
</body>
</html>
