<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SBIK</title>
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='white'><path d='M0 0h24v24H0z' fill='none'/><path d='M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z'/></svg>?v=2">
    
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background-color: #020617 !important; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-text {
            color: #00e676;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 1;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-text">APP_SBIK</div>
    </div>

    <iframe 
        id="gas-app"
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation; camera; microphone; autoplay">
    </iframe>

    <script>
        const loader = document.getElementById('loading-screen');
        document.getElementById('gas-app').onload = function() {
            loader.classList.add('fade-out');
        };
        setTimeout(() => {
            loader.classList.add('fade-out');
        }, 3000);
    </script>
</body>
</html>
