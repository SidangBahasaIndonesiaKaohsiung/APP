<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APP_SBIK</title>
    <style>
        /* 1. 全体の背景を白ではなく「紺色」にする */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #1a237e; /* アプリのテーマカラー：濃い青（紺色） */
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. 読み込み中に中央に表示される文字の設定 */
        .loading-text {
            color: rgba(255, 255, 255, 0.8); /* 文字は白っぽく */
            font-family: sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 1; /* iframeの下に配置 */
            animation: pulse 1.5s infinite; /* ふわふわ光らせる */
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* 3. GASの画面を表示するiframeの設定 */
        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 10; /* 読み込まれたら上に被さる */
            background: transparent; /* 背景を透過させて下の紺色を見せる */
        }
    </style>
</head>
<body>
    <div class="loading-text">CONNECTING TO SBIK...</div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation; camera; microphone; autoplay">
    </iframe>
</body>
</html>
