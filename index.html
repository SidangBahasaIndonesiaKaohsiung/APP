<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APP_SBIK</title>
    <style>
        /* 1. 背景を白ではなく「アプリの色」にする */
        html, body { 
            margin: 0; 
            padding: 0; 
            background: #1a237e; /* ヘッダーと同じ濃い青 */
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 2. iframeが読み込まれるまで表示される文字やアイコン */
        .loading-text {
            color: white;
            font-family: sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 1;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 10; /* 読み込まれたら上に被さる */
            background: transparent;
        }
    </style>
</head>
<body>
    <div class="loading-text">CONNECTING TO SBIK...</div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation; camera; microphone; autoplay"
        loading="eager">
    </iframe>
</body>
</html>
