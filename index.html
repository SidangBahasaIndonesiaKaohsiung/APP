<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>APP_SBIK</title>
    <style>
        html, body { 
            margin: 0; 
            padding: 0; 
            background-color: #020617 !important; 
            overflow: hidden; 
            height: 100vh; 
            width: 100vw;
        }

        /* 文字のコンテナ：最初から絶対に見えるように設定 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #020617;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* 何があっても最前面 */
        }

        .loading-text {
            color: #00e676;
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 4px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        iframe { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            border: none;
            z-index: 1;
        }

        /* 消える時のアニメーションクラス */
        .fade-out {
            opacity: 0;
            transition: opacity 0.8s ease;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-text">APP_SBIK</div>
    </div>

    <iframe 
        id="gas-app"
        src="https://script.google.com/macros/s/AKfycbwWbSECz8Tm7581UzAkVHQJlNfR02UuTBVrVCPJtdklO1ep1LbOWN94XgDBLT3gethk2A/exec" 
        allow="geolocation; camera; microphone; autoplay">
    </iframe>

    <script>
        const loader = document.getElementById('loading-screen');
        
        // 1. iframeが完全に読み込まれたら消す
        document.getElementById('gas-app').onload = function() {
            loader.classList.add('fade-out');
        };

        // 2. もし読み込みが遅くても、3秒経ったら強制的に文字を薄くしてアプリを見せる
        setTimeout(() => {
            loader.classList.add('fade-out');
        }, 3000);
    </script>
</body>
</html>
